name: Regenerate NeuroEngage Dashboard

on:
  schedule:
    - cron: '0 */4 * * *'   # runs every 4 hours automatically
  workflow_dispatch:          # allows manual trigger from GitHub UI anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Download latest data from OneDrive
        env:
          ONEDRIVE_URL: ${{ secrets.ONEDRIVE_URL }}
        run: |
          python3 download_data.py

      - name: Generate dashboard
        run: |
          python3 generate_dashboard.py data/outreach_data.csv docs/index.html

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "NeuroEngage Bot"
          git config user.email "actions@github.com"
          git add docs/index.html data/outreach_data.csv
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date +'%Y-%m-%d %H:%M UTC')"
          git push
